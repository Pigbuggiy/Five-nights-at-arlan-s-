<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNAF Multiplayer Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; -webkit-user-select: none; touch-action: none; }
        
        #menu { 
            position: fixed; width: 100%; height: 100%; 
            background: url('menu.png') no-repeat center center; 
            background-size: cover; z-index: 100; display: flex; 
            flex-direction: column; justify-content: center; align-items: flex-start;
            padding-left: 50px;
        }

        .btn { 
            background: rgba(139, 0, 0, 0.8); color: #fff; border: 2px solid #500; 
            padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 20px; 
            text-transform: uppercase; font-weight: bold; width: 250px;
        }

        .overlay {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); 
            padding: 30px; border: 3px solid red; z-index: 110; color: white;
            text-align: center; width: 80%; max-width: 400px;
        }

        #joystick-container { 
            position: fixed; bottom: 40px; left: 40px; 
            width: 150px; height: 150px; z-index: 60; 
        }

        #flashlight-btn { 
            position: fixed; bottom: 60px; right: 60px; 
            width: 100px; height: 100px; background: rgba(255,255,255,0.1); 
            border: 4px solid #fff; border-radius: 50%; z-index: 60;
            color: white; font-weight: bold; font-size: 18px;
        }

        #ui { 
            display: none; position: fixed; top: 20px; right: 20px; 
            color: #fff; z-index: 50; text-align: right; pointer-events: none;
            font-family: 'Courier New', monospace; font-size: 24px;
        }

        #night-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; justify-content: center; align-items: center;
            flex-direction: column; z-index: 200; font-size: 40px;
        }
    </style>
</head>
<body>

    <div id="menu">
        <button class="btn" onclick="openCreate()">СОЗДАТЬ ИГРУ</button>
        <button class="btn" onclick="openBrowser()">НАЙТИ СЕРВЕР</button>
    </div>

    <div id="create-box" class="overlay">
        <h2>Название сервера</h2>
        <input type="text" id="server-name" placeholder="Сервер Арлана...">
        <button class="btn" onclick="confirmCreate()">ОК</button>
        <button class="btn" onclick="closeAll()">НАЗАД</button>
    </div>

    <div id="browser-box" class="overlay">
        <h2>Сервера</h2>
        <div id="server-list"></div>
        <button class="btn" onclick="closeAll()">НАЗАД</button>
    </div>

    <div id="lobby-box" class="overlay">
        <h2>Лобби</h2>
        <p id="player-count">Игроков: 1/6</p>
        <button id="start-btn" class="btn" style="display:none;" onclick="requestStart()">НАЧАТЬ</button>
    </div>

    <div id="ui">
        <div id="clock">12:00 AM</div>
        <div id="night-num">Ночь 1</div>
    </div>

    <div id="night-screen">
        <h1 id="night-text">1 Ночь</h1>
    </div>

    <div id="joystick-container"></div>
    <button id="flashlight-btn" onclick="toggleFlashlight()">СВЕТ</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        // ИСПРАВЛЕНО: Добавлены кавычки для ссылки
        const socket = io("https://arlan-server.onrender.com");
        
        let scene, camera, renderer, flashLightObj, worldModel = null;
        let myRoom = null, isHost = false, currentNight = 1, gameActive = false;
        let otherPlayers = {}, moveVector = { x: 0, z: 0 };
        const raycaster = new THREE.Raycaster();

        // Проверка ошибок для тебя (выведет в консоль если сервер спит)
        socket.on('connect_error', (err) => { console.log("Ожидание пробуждения сервера..."); });

        function openCreate() { document.getElementById('create-box').style.display = 'block'; }
        function openBrowser() { document.getElementById('browser-box').style.display = 'block'; socket.emit('get_rooms'); }
        function closeAll() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

        function confirmCreate() {
            const name = document.getElementById('server-name').value;
            if(name) {
                myRoom = name; isHost = true;
                socket.emit('create_room', name);
                document.getElementById('create-box').style.display = 'none';
                document.getElementById('lobby-box').style.display = 'block';
                document.getElementById('start-btn').style.display = 'block';
            }
        }

        socket.on('rooms_list', (rooms) => {
            const list = document.getElementById('server-list');
            list.innerHTML = rooms.length ? '' : 'Пусто...';
            rooms.forEach(r => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = `${r.name} (${r.players}/6)`;
                b.onclick = () => { myRoom = r.name; socket.emit('join_room', r.name); closeAll(); document.getElementById('lobby-box').style.display = 'block'; };
                list.appendChild(b);
            });
        });

        socket.on('player_joined', (players) => { document.getElementById('player-count').innerText = `Игроков: ${players.length}/6`; });
        function requestStart() { socket.emit('start_game', myRoom); }
        socket.on('game_started', () => { document.getElementById('menu').style.display = 'none'; document.getElementById('lobby-box').style.display = 'none'; document.getElementById('ui').style.display = 'block'; initThree(); });

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.1);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = "YXZ"; 
            camera.position.set(0, 1.6, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const amb = new THREE.AmbientLight(0x404040, 0.1);
            scene.add(amb);

            flashLightObj = new THREE.SpotLight(0xffffff, 0, 12, Math.PI/7, 0.5);
            flashLightObj.position.set(0, 0.2, 0); 
            camera.add(flashLightObj);
            flashLightObj.target.position.set(0, 0.2, -1); 
            camera.add(flashLightObj.target);
            scene.add(camera);

            const loader = new THREE.GLTFLoader();
            // Твоя ссылка на модель
            loader.load('fnafe.glb', (gltf) => { 
                worldModel = gltf.scene;
                scene.add(worldModel); 
            });

            initControls();
            gameActive = true;
            animate();
            startTimer();
        }

        function initControls() {
            const joy = nipplejs.create({
                zone: document.getElementById('joystick-container'),
                mode: 'static', position: { left: '75px', bottom: '75px' }, color: 'red'
            });

            joy.on('move', (e, data) => {
                const angle = data.angle.radian;
                const dist = data.distance / 50;
                moveVector.x = Math.cos(angle) * dist * 0.12;
                moveVector.z = -Math.sin(angle) * dist * 0.12;
            });
            joy.on('end', () => { moveVector = {x:0, z:0}; });

            let lastX, lastY;
            window.addEventListener('touchstart', e => {
                const x = e.touches[0].pageX;
                if (x > window.innerWidth / 2) {
                    lastX = x; lastY = e.touches[0].pageY;
                }
            });

            window.addEventListener('touchmove', e => {
                const x = e.touches[0].pageX;
                if (x > window.innerWidth / 2 && lastX !== undefined) {
                    let dx = x - lastX;
                    let dy = e.touches[0].pageY - lastY;
                    camera.rotation.y -= dx * 0.005;
                    camera.rotation.x -= dy * 0.005;
                    camera.rotation.x = Math.max(-1.2, Math.min(1.2, camera.rotation.x));
                    lastX = x; lastY = e.touches[0].pageY;
                }
            });

            window.addEventListener('touchend', () => { lastX = undefined; });
        }

        function toggleFlashlight() { flashLightObj.intensity = flashLightObj.intensity === 0 ? 4 : 0; }

        function checkCollision() {
            if (!worldModel) return false;
            const dir = new THREE.Vector3(moveVector.x, 0, moveVector.z).applyQuaternion(camera.quaternion).normalize();
            raycaster.set(camera.position, dir);
            const intersects = raycaster.intersectObjects(worldModel.children, true);
            
            if (intersects.length > 0 && intersects[0].distance < 0.6) {
                const objName = intersects[0].object.name.toLowerCase();
                if (objName.includes('door') || objName.includes('дверь')) {
                    return false;
                }
                return true;
            }
            return false;
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);

            if (moveVector.x !== 0 || moveVector.z !== 0) {
                const angle = camera.rotation.y;
                const dx = moveVector.x * Math.cos(angle) + moveVector.z * Math.sin(angle);
                const dz = moveVector.x * -Math.sin(angle) + moveVector.z * Math.cos(angle);

                if (!checkCollision()) {
                    camera.position.x += dx;
                    camera.position.z += dz;
                }
            }

            socket.emit('move', { roomName: myRoom, pos: camera.position, rot: camera.rotation.y });
            renderer.render(scene, camera);
        }

        function startTimer() {
            let h = 0;
            setInterval(() => {
                h++;
                document.getElementById('clock').innerText = h + ":00 AM";
                if(h === 6) winNight();
            }, 90000);
            new Audio('phone.mp3').play();
        }

        function winNight() {
            new Audio('win.mp3').play();
            const s = document.getElementById('night-screen');
            s.style.display = 'flex';
            s.innerText = "Пройдена ночь " + currentNight;
            setTimeout(() => location.reload(), 5000);
        }

        socket.on('player_moved', (data) => {
            if(!otherPlayers[data.id]) {
                const map = new THREE.TextureLoader().load('maks.png');
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map}));
                sprite.scale.set(1.5, 1.5, 1);
                scene.add(sprite);
                otherPlayers[data.id] = sprite;
            }
            otherPlayers[data.id].position.copy(data.pos);
        });
    </script>
</body>
</html>
